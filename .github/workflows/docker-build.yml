name: Docker Build & Test

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Agent Zero image
      run: |
        docker build -t agent-zero:test .
    
    - name: Start stack
      run: |
        docker compose up -d
    
    - name: Wait for services
      run: |
        timeout 120 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 5; done'
    
    - name: Test Ollama
      run: |
        docker exec ollama ollama list || echo "Ollama not ready (expected in CI)"
    
    - name: Test n8n health
      run: |
        curl -f http://localhost:5678/healthz || exit 1
    
    - name: Test Agent Zero health
      run: |
        curl -f http://localhost:8000/health || echo "Agent Zero health check (implement endpoint)"
    
    - name: Check logs for errors
      if: failure()
      run: |
        docker compose logs
    
    - name: Cleanup
      if: always()
      run: |
        docker compose down -v

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flake8 black
    
    - name: Lint with flake8
      run: |
        flake8 python/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 python/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: |
        black --check python/
